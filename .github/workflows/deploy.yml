name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy backend in EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            cd /home/ubuntu/frontefolio_microservice

            echo "Actualizando código desde GitHub..."
            git pull origin main

            echo "Reiniciando contenedores Docker..."
            docker compose down
            docker compose up -d --build

            echo "Estado de contenedores:"
            docker ps

            echo "Esperando a que el gateway esté listo..."
            sleep 15

            echo "Health check con reintentos:"
            for i in {1..10}; do
              if curl -f http://localhost:3000/health; then
                echo "Deploy correcto"
                exit 0
              fi

              echo "Gateway aún no listo. Reintento $i/10..."
              docker logs frontefolio_gateway --tail=20 || true
              sleep 5
            done

            echo "Error: el gateway no respondió correctamente"
            docker ps
            docker logs frontefolio_gateway --tail=80 || true
            exit 1
